# Production Nginx Reverse Proxy Configuration (Host System)
# Save this file to /etc/nginx/sites-available/electromtech-stok on your server

server {
    listen 80;
    server_name stok.elektromtech.com; # REPLACE WITH YOUR DOMAIN NAME

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Certbot / Let's Encrypt ACME Challenge verification path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name stok.elektromtech.com; # REPLACE WITH YOUR DOMAIN NAME

    # SSL Certificate Paths (Managed automatically by Certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/stok.elektromtech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stok.elektromtech.com/privkey.pem;

    # SSL Security Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Frontend PWA & Reverse Proxy Routing
    location / {
        # Redirect to the running frontend container port
        proxy_pass http://127.0.0.1:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # PWA-specific headers for service worker files
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
